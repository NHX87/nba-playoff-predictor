name: Nightly Pipeline

on:
  schedule:
    - cron: '0 6 * * *'   # '6 AM UTC daily
  workflow_dispatch:        # manual trigger from GitHub UI

env:
  HF_REPO_ID: NHX87/nba-playoff-predictor
  PYTHON_VERSION: "3.12"

jobs:
  fetch:
    name: Fetch current season data
    runs-on: self-hosted        # Mac Mini — home IP not blocked by stats.nba.com
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Snapshot row counts before fetch
        run: |
          python - <<'EOF' > /tmp/before_counts.txt
          import pandas as pd, glob, json
          counts = {f: len(pd.read_parquet(f)) for f in glob.glob("data/raw/*2025-26*.parquet")}
          print(json.dumps(counts))
          EOF
          cat /tmp/before_counts.txt

      - name: Bust 2025-26 cache
        run: rm -f data/raw/*2025-26*.parquet

      - name: Fetch 2025-26 game + player logs
        run: |
          python -m pipeline.ingestion.fetch_games
          python -m pipeline.ingestion.fetch_players

      - name: Commit updated parquets if data changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import os, pandas as pd, glob, json, subprocess, sys

          before = json.loads(open("/tmp/before_counts.txt").read())
          after  = {f: len(pd.read_parquet(f)) for f in glob.glob("data/raw/*2025-26*.parquet")}

          if before == after:
              print("Row counts unchanged — skipping commit.")
              sys.exit(0)

          print(f"Data changed: {before} -> {after}")
          token = os.environ["GITHUB_TOKEN"]
          subprocess.run(["git", "config", "user.name",  "github-actions[bot]"], check=True)
          subprocess.run(["git", "config", "user.email", "github-actions[bot]@users.noreply.github.com"], check=True)
          subprocess.run(["git", "remote", "set-url", "origin",
              f"https://x-access-token:{token}@github.com/NHX87/nba-playoff-predictor.git"], check=True)
          # Use data/raw/ so deletions (e.g. playoffs file not yet available) are also staged
          subprocess.run(["git", "add", "data/raw/"], check=True)
          # Skip commit if nothing staged (shouldn't happen here but guard anyway)
          diff = subprocess.run(["git", "diff", "--cached", "--quiet"])
          if diff.returncode == 0:
              print("Nothing staged after add — skipping commit.")
              sys.exit(0)
          subprocess.run(["git", "commit", "-m", "chore: refresh 2025-26 parquets"], check=True)
          # Stash any other local modifications (e.g. notebooks on the Mac Mini runner)
          # so that rebase has a clean working tree to work with.
          subprocess.run(["git", "stash"])
          subprocess.run(["git", "pull", "--rebase"], check=True)
          subprocess.run(["git", "stash", "pop"])
          subprocess.run(["git", "push"], check=True)
          EOF

  pipeline:
    name: Train models and push to HF Spaces
    runs-on: ubuntu-latest
    needs: fetch
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main              # pick up the parquet commit from fetch job

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt huggingface_hub

      - name: Create empty 2025-26 Playoffs placeholders
        run: |
          python - <<'EOF'
          import pandas as pd
          from pathlib import Path
          # If playoffs haven't started yet, no cache file exists and fetch would hit the API.
          # Write empty parquets so the cache check passes and the API call is skipped.
          for fname in [
              "data/raw/games_2025-26_Playoffs.parquet",
              "data/raw/player_logs_2025-26_Playoffs.parquet",
          ]:
              if not Path(fname).exists():
                  pd.DataFrame().to_parquet(fname, index=False)
                  print(f"Created empty placeholder: {fname}")
          EOF

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PATH: data/processed/nba.duckdb
        run: |
          python -m pipeline.run_pipeline \
            --with-model \
            --with-current-projections \
            --with-remaining-schedule \
            --with-sanity-report

      - name: Export app tables to nba_app.duckdb
        run: |
          python - <<'EOF'
          import duckdb

          APP_TABLES = [
              "app_title_odds_current",
              "app_series_predictions_current",
              "app_playoff_field_current",
              "app_play_in_current",
              "loyo_season_summary",
              "loyo_series_predictions",
              "current_season_predictions",
              "current_feature_snapshot",
              "regular_season",         # feeds odds-over-time chart + last-10 hot streaks
              "raw_player_logs_rs",     # feeds player stats in team drilldown
              "team_remaining_games",   # per-game win probs for upcoming opponents
              "team_projected_record",  # Monte Carlo projected final records + seed probs
              "model_features",         # 5 FINAL_FEATURES for team drilldown + analyst
              "daily_model_scores",     # historical CoxPH scores per team per game date
              "player_impact",          # with/without splits for player impact quantification
              "playoff_bracket_live",   # live playoff series results (only exists during playoffs)
              "live_standings",         # latest standings from self-hosted runner (API fallback for HF)
          ]

          src = duckdb.connect("data/processed/nba.duckdb", read_only=True)
          dst = duckdb.connect("data/processed/nba_app.duckdb")

          for table in APP_TABLES:
              try:
                  df = src.execute(f"SELECT * FROM {table}").df()
                  dst.execute(f"DROP TABLE IF EXISTS {table}")
                  dst.execute(f"CREATE TABLE {table} AS SELECT * FROM df")
                  print(f"  {table}: {len(df)} rows")
              except Exception as e:
                  print(f"  Warning: {table} skipped — {e}")

          src.close()
          dst.close()
          print("Export complete.")
          EOF

      - name: Push artifacts to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ env.HF_REPO_ID }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_REPO_ID"]

          # Recreate repo to purge stale LFS history that inflates storage
          import time
          try:
              api.delete_repo(repo_id, repo_type="space")
              print("Deleted old HF Space to purge LFS history")
              time.sleep(5)
          except Exception:
              print("No existing repo to delete (or already gone)")
          # Create with gradio SDK placeholder — README.md frontmatter overrides to streamlit
          api.create_repo(repo_id, repo_type="space", space_sdk="gradio", exist_ok=True)

          # Push entire repo (README.md frontmatter sets sdk: streamlit)
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              commit_message="chore: nightly pipeline — sync code + artifacts",
              ignore_patterns=[
                  ".git/**",
                  "data/raw/**",                 # pipeline cache only — app uses nba_app.duckdb
                  "data/processed/nba.duckdb",   # full DB too large; app uses nba_app.duckdb
                  "models/trained/*.pkl",
                  "models/trained/*.joblib",
                  "__pycache__/**",
                  "*.pyc",
              ],
          )

          print(f"Pushed to https://huggingface.co/spaces/{repo_id}")
          EOF
