name: Nightly Pipeline

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC daily
  workflow_dispatch:        # manual trigger from GitHub UI

env:
  HF_REPO_ID: NHX87/nba-playoff-predictor
  PYTHON_VERSION: "3.12"

jobs:
  fetch:
    name: Fetch current season data
    runs-on: self-hosted        # Mac Mini — home IP not blocked by stats.nba.com
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Snapshot row counts before fetch
        run: |
          python - <<'EOF' > /tmp/before_counts.txt
          import pandas as pd, glob, json
          counts = {f: len(pd.read_parquet(f)) for f in glob.glob("data/raw/*2025-26*.parquet")}
          print(json.dumps(counts))
          EOF
          cat /tmp/before_counts.txt

      - name: Bust 2025-26 cache
        run: rm -f data/raw/*2025-26*.parquet

      - name: Fetch 2025-26 game + player logs
        run: |
          python -m pipeline.ingestion.fetch_games
          python -m pipeline.ingestion.fetch_players

      - name: Commit updated parquets if data changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import os, pandas as pd, glob, json, subprocess, sys

          before = json.loads(open("/tmp/before_counts.txt").read())
          after  = {f: len(pd.read_parquet(f)) for f in glob.glob("data/raw/*2025-26*.parquet")}

          if before == after:
              print("Row counts unchanged — skipping commit.")
              sys.exit(0)

          print(f"Data changed: {before} -> {after}")
          token = os.environ["GITHUB_TOKEN"]
          subprocess.run(["git", "config", "user.name",  "github-actions[bot]"], check=True)
          subprocess.run(["git", "config", "user.email", "github-actions[bot]@users.noreply.github.com"], check=True)
          subprocess.run(["git", "remote", "set-url", "origin",
              f"https://x-access-token:{token}@github.com/NHX87/nba-playoff-predictor.git"], check=True)
          # Use data/raw/ so deletions (e.g. playoffs file not yet available) are also staged
          subprocess.run(["git", "add", "data/raw/"], check=True)
          # Skip commit if nothing staged (shouldn't happen here but guard anyway)
          diff = subprocess.run(["git", "diff", "--cached", "--quiet"])
          if diff.returncode == 0:
              print("Nothing staged after add — skipping commit.")
              sys.exit(0)
          subprocess.run(["git", "commit", "-m", "chore: refresh 2025-26 parquets"], check=True)
          subprocess.run(["git", "push"], check=True)
          EOF

  pipeline:
    name: Train models and push to HF Spaces
    runs-on: ubuntu-latest
    needs: fetch
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main              # pick up the parquet commit from fetch job

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt huggingface_hub

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PATH: data/processed/nba_app.duckdb
        run: |
          python -m pipeline.run_pipeline \
            --skip-fetch \
            --with-model \
            --with-current-projections \
            --with-sanity-report

      - name: Push artifacts to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ env.HF_REPO_ID }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_REPO_ID"]

          # Push slim app database (what Streamlit reads)
          api.upload_file(
              path_or_fileobj="data/processed/nba_app.duckdb",
              path_in_repo="data/processed/nba_app.duckdb",
              repo_id=repo_id,
              repo_type="space",
              commit_message="chore: nightly pipeline — updated DB",
          )

          # Push model artifacts (CSV, JSON, MD — skip binary pkl/joblib)
          api.upload_folder(
              folder_path="models/trained",
              path_in_repo="models/trained",
              repo_id=repo_id,
              repo_type="space",
              commit_message="chore: nightly pipeline — updated model artifacts",
              ignore_patterns=["*.pkl", "*.joblib"],
          )

          print(f"Pushed to https://huggingface.co/spaces/{repo_id}")
          EOF
